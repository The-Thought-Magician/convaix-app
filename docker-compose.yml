services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: convaix
      POSTGRES_PASSWORD: convaix
      POSTGRES_DB: convaix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convaix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: {}
